<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- viewport-fit=cover lets the app extend under the notch / browser chrome; the canvas is
         then sized with dvh so nothing is cut off behind a mobile browser's address bar. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PlayParty</title>
    <meta name="theme-color" content="#0D0D1A">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PlayParty">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0D0D1A;
            overscroll-behavior: none;
        }
        /* Pin to the VISUAL viewport and size with dvh so the app always fits the screen — a
           mobile browser's retractable toolbar no longer clips the bottom of the UI. */
        #ComposeTarget {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;   /* fallback for browsers without dvh */
            height: 100dvh;
        }
        /* Skiko renders into a <canvas> it creates inside #ComposeTarget — make it fill exactly. */
        #ComposeTarget canvas,
        canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>
<body>
<div id="ComposeTarget"></div>

<!-- First-load splash: shown immediately while the ~5 MB (brotli) wasm downloads +
     compiles + Compose paints its first frame, then hidden by signalWasmLoaded() from
     Kotlin main(). Without it the whole cold-load is a blank black screen. -->
<div id="loading" style="display:flex;justify-content:center;align-items:center;height:100vh;height:100dvh;width:100%;position:fixed;top:0;left:0;z-index:9999;background:#0D0D1A;color:#fff;font-family:system-ui,-apple-system,Roboto,sans-serif;">
  <div style="text-align:center;">
    <div style="width:46px;height:46px;border:4px solid #2A2A3F;border-top:4px solid #22D3EE;border-radius:50%;animation:pp-spin 0.9s linear infinite;margin:0 auto 16px;"></div>
    <p style="margin:0;opacity:0.85;font-size:14px;letter-spacing:0.4px;">Loading PlayParty…</p>
  </div>
</div>
<style>@keyframes pp-spin{to{transform:rotate(360deg)}}</style>
<script>
  // If the wasm never boots (old browser without WasmGC, blocked CDN, dead connection),
  // swap the spinner for an actionable error instead of spinning forever.
  window.__pp_wasm_loaded = false;
  window.addEventListener('error', function(e){ if(!window.__pp_first_error) window.__pp_first_error = (e.error && (e.error.stack||e.error.message)) || e.message; });
  window.addEventListener('unhandledrejection', function(e){ if(!window.__pp_first_error) window.__pp_first_error = (e.reason && (e.reason.stack||e.reason.message)) || String(e.reason); });
  setTimeout(function(){
    if (window.__pp_wasm_loaded) return;
    var l = document.getElementById('loading'); if (!l) return;
    var msg = window.__pp_first_error ? String(window.__pp_first_error)
      : (typeof WebAssembly === 'undefined' ? 'WebAssembly is not available in this browser.'
      : 'The app did not load within 60s. Use a recent browser (Chrome 119+, Firefox 120+, Safari 18.4+) and check your connection.');
    l.innerHTML = '<div style="text-align:center;max-width:620px;padding:24px;">'
      + '<h2 style="margin:0 0 10px;">PlayParty couldn\'t start</h2>'
      + '<p style="color:#f87171;font:13px/1.5 ui-monospace,monospace;white-space:pre-wrap;text-align:left;">' + msg + '</p>'
      + '<button onclick="location.reload()" style="margin-top:16px;background:#22D3EE;color:#04121a;border:0;padding:10px 22px;border-radius:8px;font-weight:700;cursor:pointer;">Retry</button></div>';
  }, 60000);
</script>

<!-- LiveKit Client JS SDK (UMD global `LivekitClient`) — loaded BEFORE the wasm app so the
     __pp_lk_* bridge globals exist before Kotlin init. Adapted from WatchParty's web LiveKit. -->
<script src="https://unpkg.com/livekit-client@2.17.3/dist/livekit-client.umd.js"></script>
<script>
    window.__pp_lk_room = null;
    window.__pp_lk_activeSpeakers = {};
    window.__pp_lk_videoBindings = window.__pp_lk_videoBindings || {};
    window.__pp_lk_lastCameraError = '';
    window.__pp_lk_lastMicError = '';
    window.__pp_lk_pendingCamera = null;
    window.__pp_lk_pendingMic = null;

    // identity -> Set<HTMLVideoElement>. A renderer registers its <video> BEFORE the track may
    // exist; room events re-attach when it lands. Attaching once at mount silently no-ops otherwise.
    function __pp_lk_tryAttachToBindings(participant) {
        if (!participant) return;
        var els = window.__pp_lk_videoBindings[participant.identity];
        if (!els || els.size === 0) return;
        participant.videoTrackPublications.forEach(function(pub) {
            if (pub.track) {
                els.forEach(function(el) { try { pub.track.attach(el); el.muted = true; var pr = el.play(); if (pr && pr.catch) pr.catch(function(){}); } catch (e) { console.error('[PP-LK] attach failed', e); } });
            }
        });
    }

    window.__pp_lk_connect = async function(url, token) {
        try {
            const room = new LivekitClient.Room();
            await room.connect(url, token);
            window.__pp_lk_room = room;

            room.on('trackSubscribed', function(track, pub, participant) { if (track.kind === 'video') __pp_lk_tryAttachToBindings(participant); });
            room.on('localTrackPublished', function(pub, participant) { if (pub.kind === 'video') __pp_lk_tryAttachToBindings(participant); });
            room.on('participantConnected', function(participant) { __pp_lk_tryAttachToBindings(participant); });
            room.on('trackUnsubscribed', function(track) { try { track.detach(); } catch (_) {} });
            room.on('activeSpeakersChanged', function(speakers) {
                var map = {};
                if (speakers && speakers.forEach) speakers.forEach(function(p) { if (p && p.identity) map[p.identity] = true; });
                window.__pp_lk_activeSpeakers = map;
            });

            __pp_lk_tryAttachToBindings(room.localParticipant);

            if (window.__pp_lk_pendingCamera !== null) {
                var want = window.__pp_lk_pendingCamera; window.__pp_lk_pendingCamera = null;
                try { await room.localParticipant.setCameraEnabled(want); __pp_lk_tryAttachToBindings(room.localParticipant); }
                catch (e) { window.__pp_lk_lastCameraError = (e && e.name ? e.name + ': ' : '') + (e && e.message ? e.message : 'camera failed'); }
            }
            if (window.__pp_lk_pendingMic !== null) {
                var wantMic = window.__pp_lk_pendingMic; window.__pp_lk_pendingMic = null;
                try { await room.localParticipant.setMicrophoneEnabled(wantMic); }
                catch (e) { window.__pp_lk_lastMicError = (e && e.name ? e.name + ': ' : '') + (e && e.message ? e.message : 'mic failed'); }
            }
            console.log('[PP-LK] Connected to room');
            return true;
        } catch (e) { console.error('[PP-LK] Connect failed:', e); throw e; }
    };

    window.__pp_lk_disconnect = async function() {
        if (window.__pp_lk_room) { await window.__pp_lk_room.disconnect(); window.__pp_lk_room = null; console.log('[PP-LK] Disconnected'); }
    };

    window.__pp_lk_setMicEnabled = async function(enabled) {
        if (!window.__pp_lk_room) { window.__pp_lk_pendingMic = enabled; return false; }
        try { await window.__pp_lk_room.localParticipant.setMicrophoneEnabled(enabled); window.__pp_lk_pendingMic = null; return true; }
        catch (e) {
            console.error('[PP-LK] setMicEnabled failed:', e);
            window.__pp_lk_lastMicError = (e && e.name ? e.name + ': ' : '') + (e && e.message ? e.message : 'mic failed');
            throw e;
        }
    };

    window.__pp_lk_setCameraEnabled = async function(enabled) {
        if (!window.__pp_lk_room) { window.__pp_lk_pendingCamera = enabled; return false; }
        try { await window.__pp_lk_room.localParticipant.setCameraEnabled(enabled); __pp_lk_tryAttachToBindings(window.__pp_lk_room.localParticipant); return true; }
        catch (e) {
            console.error('[PP-LK] setCameraEnabled failed:', e);
            window.__pp_lk_lastCameraError = (e && e.name ? e.name + ': ' : '') + (e && e.message ? e.message : 'camera failed');
            throw e;
        }
    };

    window.__pp_lk_hasPermission = async function(kind) {
        try {
            if (!navigator.permissions || !navigator.permissions.query) return false;
            var st = await navigator.permissions.query({ name: kind });
            return !!(st && st.state === 'granted');
        } catch (e) { return false; }
    };

    window.__pp_lk_reattachLocal = function() { if (window.__pp_lk_room) __pp_lk_tryAttachToBindings(window.__pp_lk_room.localParticipant); };

    // Gesture-driven permission primers so the browser shows its prompt the instant the user taps.
    window.__pp_lk_requestMediaPermission = async function() {
        try {
            if (await window.__pp_lk_hasPermission('camera')) return true;
            var s = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
            s.getTracks().forEach(function(t){ t.stop(); });
            return true;
        } catch (e) { console.warn('[PP-LK] camera permission denied/failed:', e && e.name); return false; }
    };
    window.__pp_lk_requestAudioPermission = async function() {
        try {
            if (await window.__pp_lk_hasPermission('microphone')) return true;
            var s = await navigator.mediaDevices.getUserMedia({ video: false, audio: true });
            s.getTracks().forEach(function(t){ t.stop(); });
            return true;
        } catch (e) { console.warn('[PP-LK] audio permission denied/failed:', e && e.name); return false; }
    };

    window.__pp_lk_getParticipants = function() {
        if (!window.__pp_lk_room) return '[]';
        var participants = [];
        var lp = window.__pp_lk_room.localParticipant;
        participants.push({ identity: lp.identity, name: lp.name || '', isSpeaking: (window.__pp_lk_activeSpeakers[lp.identity] === true) || lp.isSpeaking, isMicEnabled: lp.isMicrophoneEnabled, isCameraEnabled: lp.isCameraEnabled, connectionQuality: 'EXCELLENT' });
        window.__pp_lk_room.remoteParticipants.forEach(function(p) {
            participants.push({ identity: p.identity, name: p.name || '', isSpeaking: (window.__pp_lk_activeSpeakers[p.identity] === true) || p.isSpeaking, isMicEnabled: p.isMicrophoneEnabled, isCameraEnabled: p.isCameraEnabled, connectionQuality: p.connectionQuality || 'UNKNOWN' });
        });
        return JSON.stringify(participants);
    };

    window.__pp_lk_getConnectionState = function() {
        if (!window.__pp_lk_room) return 'DISCONNECTED';
        switch (window.__pp_lk_room.state) {
            case 'connected': return 'CONNECTED';
            case 'connecting': return 'CONNECTING';
            case 'reconnecting': return 'RECONNECTING';
            default: return 'DISCONNECTED';
        }
    };

    window.__pp_lk_attachVideo = function(identity, videoElement) {
        if (!window.__pp_lk_videoBindings[identity]) window.__pp_lk_videoBindings[identity] = new Set();
        window.__pp_lk_videoBindings[identity].add(videoElement);
        if (!window.__pp_lk_room) return true;
        var participant = (window.__pp_lk_room.localParticipant.identity === identity)
            ? window.__pp_lk_room.localParticipant
            : window.__pp_lk_room.remoteParticipants.get(identity);
        if (!participant) return true;
        participant.videoTrackPublications.forEach(function(pub) { if (pub.track) { try { pub.track.attach(videoElement); videoElement.muted = true; var pr = videoElement.play(); if (pr && pr.catch) pr.catch(function(){}); } catch (e) { console.error('[PP-LK] attach', e); } } });
        return true;
    };

    window.__pp_lk_detachVideo = function(videoElement) {
        if (window.__pp_lk_videoBindings) Object.keys(window.__pp_lk_videoBindings).forEach(function(k) { window.__pp_lk_videoBindings[k].delete(videoElement); });
        // Detach the element WITHOUT stopping the track — LiveKit owns the track lifecycle
        // (it stops tracks on camera-off / disconnect). Stopping here killed the LOCAL camera
        // when a grid tile recycled on scroll, so scrolling back showed nothing.
        if (videoElement.srcObject) videoElement.srcObject = null;
    };
</script>

<script src="playparty.js"></script>
</body>
</html>
